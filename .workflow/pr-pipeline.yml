version: '1.0'
name: pr-pipeline
displayName: PRPipeline
stages:
  - stage:
    name: validate
    displayName: 静态检查
    steps:
      - step: shell@linux
        name: check_files
        displayName: 检查报告文件
        commands:
          - echo "=== 纯前端项目，无需构建 ==="
          - test -f index.html && echo "入口页 index.html: OK" || echo "入口页 index.html: MISSING"
          - test -f assets/charts.js && echo "图表 JS: OK" || echo "图表 JS: MISSING"
          - echo "=== 检查完成 ==="
triggers:
  pr:
    branches:
      include:
        - master
