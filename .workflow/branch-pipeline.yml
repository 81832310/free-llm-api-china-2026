version: '1.0'
name: branch-pipeline
displayName: BranchPipeline
stages:
  - stage:
    name: validate
    displayName: 静态检查
    steps:
      - step: shell@linux
        name: check_files
        displayName: 检查报告文件
        commands:
          - echo "=== 纯前端项目，无需构建 ==="
          - test -f free-llm-api-china-2026.html && echo "HTML 报告: OK" || echo "HTML 报告: MISSING"
          - test -f assets/charts.js && echo "图表 JS: OK" || echo "图表 JS: MISSING"
          - echo "=== 检查完成 ==="
triggers:
  push:
    branches:
      exclude:
        - master
      include:
        - .*
